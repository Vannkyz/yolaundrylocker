<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Manajemen Loker - 40 Locker</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="sync-status" id="syncStatus">
            <i class="fas fa-sync-alt"></i> Menyinkronkan data...
        </div>
        
        <header>
            <h1><i class="fas fa-archive"></i> Sistem Manajemen Loker</h1>
            <p>40 Loker | Data Tersimpan di GitHub | Auto Sync Setiap 30 Detik</p>
        </header>

        <div class="petugas-section">
            <label><i class="fas fa-user-tie"></i> Pilih Petugas:</label>
            <select id="selectPetugas">
                <option value="">-- Pilih Petugas --</option>
                <option value="Iwan">Iwan</option>
                <option value="Sigit">Sigit</option>
                <option value="Broery">Broery</option>
                <option value="Jean">Jean</option>
            </select>
        </div>

        <div class="nav-loker">
            <button class="nav-btn" id="prevNav"><i class="fas fa-chevron-left"></i></button>
            <div class="loker-nav-list" id="lokerNavList"></div>
            <button class="nav-btn" id="nextNav"><i class="fas fa-chevron-right"></i></button>
        </div>

        <div class="form-container" id="formContainer">
            <h2 id="lokerTitle">Loker <span id="lokerNumber">1</span></h2>
            
            <div class="form-group">
                <label><i class="fas fa-user"></i> Nama Customer:</label>
                <input type="text" id="namaCustomer" placeholder="Masukkan nama customer">
            </div>

            <div class="form-group">
                <label><i class="fas fa-tag"></i> PIN Loker (Minimal 4 digit):</label>
                <input type="text" id="pinLoker" placeholder="Contoh: 1234" maxlength="10">
                <small>PIN ditampilkan langsung</small>
            </div>

            <div class="form-group">
                <label><i class="fas fa-check-circle"></i> Status:</label>
                <select id="statusLoker">
                    <option value="belum">Belum Diambil</option>
                    <option value="sudah">Sudah Diambil</option>
                </select>
            </div>

            <div class="form-group">
                <label><i class="fas fa-calendar-alt"></i> Tanggal:</label>
                <input type="text" id="tanggalLoker" readonly placeholder="Otomatis saat save">
            </div>

            <div class="form-group">
                <label><i class="fas fa-user-check"></i> Petugas:</label>
                <input type="text" id="petugasInput" readonly placeholder="Pilih dari dropdown">
            </div>

            <div class="form-group">
                <label><i class="fas fa-camera"></i> Upload Foto Bukti:</label>
                <input type="file" id="uploadFoto" accept="image/*">
                <div class="preview-foto" id="previewFoto"></div>
            </div>

            <div class="button-group">
                <button class="btn save" id="btnSave"><i class="fas fa-save"></i> Simpan Data</button>
                <button class="btn clear" id="btnClearForm"><i class="fas fa-eraser"></i> Bersihkan Form</button>
                <button class="btn clear-all" id="btnClearAllData"><i class="fas fa-trash-alt"></i> Hapus SEMUA Data</button>
            </div>
        </div>

        <div class="data-viewer">
            <h3><i class="fas fa-database"></i> Data Loker Terpilih</h3>
            <div id="dataDisplay" class="data-card"></div>
        </div>
    </div>

    <div id="modalZoom" class="modal">
        <span class="close-modal">&times;</span>
        <img class="modal-content" id="zoomImage">
    </div>

    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
